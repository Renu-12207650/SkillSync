server:
  port: 8888

spring:
  application:
    name: skillsync-config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Renu-12207650/skillsync-configs
          default-label: main
          clone-on-start: true
          timeout: 10
          search-paths: '.'

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

logging:
  level:
    org.springframework.cloud.config: DEBUG
