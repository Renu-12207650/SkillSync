version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: skillsync-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Welcome@123
      MYSQL_DATABASE: skillsync_main
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      skillsync-network:
        aliases:
          - mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: skillsync-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      skillsync-network:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: skillsync-zipkin
    ports:
      - "9411:9411"
    environment:
      - RABBIT_ADDRESSES=rabbitmq:5672
      - RABBIT_USER=guest
      - RABBIT_PASSWORD=guest
    depends_on:
      - rabbitmq
    networks:
      skillsync-network:
        aliases:
          - zipkin

  loki:
    image: grafana/loki:latest
    container_name: skillsync-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-storage:/loki/chunks
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      skillsync-network:
        aliases:
          - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: skillsync-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      skillsync-network:
        aliases:
          - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: skillsync-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - prometheus
      - loki
      - zipkin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      skillsync-network:
        aliases:
          - grafana

  eureka-server:
    build:
      context: ./skillsync-eureka-server
      dockerfile: Dockerfile
    container_name: skillsync-eureka-server
    ports:
      - "9761:9761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - zipkin
    networks:
      skillsync-network:
        aliases:
          - eureka-server

  config-server:
    build:
      context: ./skillsync-config-server
      dockerfile: Dockerfile
    container_name: skillsync-config-server
    ports:
      - "9888:9888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - eureka-server
    networks:
      skillsync-network:
        aliases:
          - config-server

  auth-service:
    build:
      context: ./skillsync-auth-service
      dockerfile: Dockerfile
    container_name: skillsync-auth-service
    ports:
      - "9081:9081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - auth-service

  user-service:
    build:
      context: ./skillsync-user-service
      dockerfile: Dockerfile
    container_name: skillsync-user-service
    ports:
      - "9082:9082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - user-service

  mentor-service:
    build:
      context: ./skillsync-mentor-service
      dockerfile: Dockerfile
    container_name: skillsync-mentor-service
    ports:
      - "9083:9083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - mentor-service

  skill-service:
    build:
      context: ./skillsync-skill-service
      dockerfile: Dockerfile
    container_name: skillsync-skill-service
    ports:
      - "9084:9084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - skill-service

  session-service:
    build:
      context: ./skillsync-session-service
      dockerfile: Dockerfile
    container_name: skillsync-session-service
    ports:
      - "9085:9085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - session-service

  notification-service:
    build:
      context: ./skillsync-notification-service
      dockerfile: Dockerfile
    container_name: skillsync-notification-service
    ports:
      - "9088:9088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - notification-service

  api-gateway:
    build:
      context: ./skillsync-api-gateway
      dockerfile: Dockerfile
    container_name: skillsync-api-gateway
    ports:
      - "9080:9080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - eureka-server
      - config-server
    networks:
      skillsync-network:
        aliases:
          - api-gateway

volumes:
  mysql-data:
    driver: local
  rabbitmq-data:
    driver: local
  loki-storage:
    driver: local

networks:
  skillsync-network:
    driver: bridge
